<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="/icon.png" type="image/png" />
<title>Precedent Reasoning — Find the cases that matter to yours</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="styles.css" rel="stylesheet" />
<style>
  /* ---------- Reset ---------- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  @media (prefers-reduced-motion: no-preference) { html { scroll-behavior: smooth; } }
  body { min-height: 100vh; }
  img, svg { display: block; }
  button, input, textarea { font: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }

  /* ---------- Theme variables (defaults overwritten by JS) ---------- */
  :root {
    --bg:        oklch(0.16 0.025 255);
    --bg-2:      oklch(0.195 0.027 255);
    --bg-3:      oklch(0.235 0.03 255);
    --border:    oklch(0.32 0.03 255 / 0.9);
    --border-2:  oklch(0.40 0.035 255 / 0.6);
    --text:      oklch(0.96 0.008 255);
    --muted:     oklch(0.70 0.025 255);
    --faint:     oklch(0.55 0.022 255);
    --accent:    oklch(0.66 0.15 250);
    --accent-2:  oklch(0.76 0.15 250);
    --accent-ink: oklch(0.16 0.03 255);
    --glow:      oklch(0.66 0.15 250 / 0.35);
    --good:      oklch(0.74 0.13 160);

    --maxw: 1180px;
    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 18px;
    --sans: "IBM Plex Sans", system-ui, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 17px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    transition: background-color 0.5s ease, color 0.5s ease;
  }

  /* page-level ambient background: faint grid + radial accent glow */
  .bg-fx {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(900px 540px at 70% -8%, var(--glow), transparent 60%),
      radial-gradient(700px 500px at 0% 8%, oklch(0.5 0.08 255 / 0.10), transparent 55%);
    transition: background 0.5s ease;
  }
  .bg-fx::after {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, oklch(0.6 0.02 255 / 0.05) 1px, transparent 1px),
      linear-gradient(to bottom, oklch(0.6 0.02 255 / 0.05) 1px, transparent 1px);
    background-size: 64px 64px;
    -webkit-mask-image: radial-gradient(1200px 700px at 60% 0%, #000 0%, transparent 75%);
            mask-image: radial-gradient(1200px 700px at 60% 0%, #000 0%, transparent 75%);
  }

  #root { position: relative; z-index: 1; }

  ::selection { background: var(--accent); color: var(--accent-ink); }

  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 99px; border: 3px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-2); }

  /* ---------- Reusable bits ---------- */
  .container { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }

  .mono { font-family: var(--mono); }
  .eyebrow {
    font-family: var(--mono); font-size: 12.5px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent-2);
    display: inline-flex; align-items: center; gap: 9px;
  }
  .eyebrow::before {
    content: ""; width: 22px; height: 1px; background: var(--accent); opacity: 0.7;
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    height: 46px; padding: 0 22px; border-radius: var(--r-sm);
    font-weight: 600; font-size: 15.5px; letter-spacing: 0.01em;
    border: 1px solid transparent; cursor: pointer;
    transition: transform 0.12s ease, background-color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, color 0.18s ease;
    white-space: nowrap;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--accent); color: var(--accent-ink);
    box-shadow: 0 1px 0 oklch(1 0 0 / 0.18) inset, 0 8px 26px -10px var(--glow);
  }
  .btn-primary:hover { background: var(--accent-2); box-shadow: 0 1px 0 oklch(1 0 0 / 0.22) inset, 0 12px 34px -10px var(--glow); }
  .btn-ghost {
    background: oklch(1 0 0 / 0.02); color: var(--text);
    border-color: var(--border);
  }
  .btn-ghost:hover { border-color: var(--border-2); background: oklch(1 0 0 / 0.05); }
  .btn-sm { height: 40px; padding: 0 16px; font-size: 14.5px; }
  .btn-lg { height: 52px; padding: 0 28px; font-size: 16.5px; }
  .btn-disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; box-shadow: none; }

  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
  }

  .section { position: relative; padding: 96px 0; }
  .section-head { max-width: 680px; }
  .section-head h2 {
    font-size: clamp(28px, 3.6vw, 42px); line-height: 1.1; font-weight: 600;
    letter-spacing: -0.02em; margin: 16px 0 0;
  }
  .section-head p { color: var(--muted); margin-top: 16px; font-size: 18px; }

  .rule { height: 1px; background: linear-gradient(to right, var(--border), transparent); }

  /* fade-up entrance */
  @media (prefers-reduced-motion: no-preference) {
    .reveal { opacity: 0; transform: translateY(18px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.in { opacity: 1; transform: none; }
  }

  /* responsive */
  @media (max-width: 880px) {
    body { font-size: 16px; }
    .section { padding: 72px 0; }
    .container { padding: 0 20px; }
  }
</style>
</head>
<body>
  <div class="bg-fx"></div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="theme.jsx"></script>
  <script type="text/babel" src="case-data.jsx"></script>
  <script type="text/babel" src="search.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
